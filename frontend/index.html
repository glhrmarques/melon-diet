<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melon Diet</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: #fff;
            padding: 2rem 3rem;
        }

        .back-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid #ddd;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
        }

        .back-btn:hover {
            background: #f5f5f5;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 700;
            color: #111;
            margin-bottom: 2rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.85rem;
            font-weight: 500;
            color: #111;
            margin-bottom: 0.5rem;
        }

        input {
            width: 100%;
            height: 48px;
            padding: 0 1rem;
            border: 1px solid #ddd;
            border-radius: 16px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #111;
        }

        .form-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: flex-end;
            padding: 1.5rem 3rem;
            background: #fff;
            border-top: 1px solid #eee;
        }

        .submit-btn {
            padding: 0.85rem 2rem;
            background: #111;
            color: #fff;
            border: none;
            border-radius: 16px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .submit-btn:hover {
            opacity: 0.85;
        }
    </style>
</head>
<body>
    <button class="back-btn" onclick="history.back()">&#8592;</button>
    <h1>Adicionar paciente</h1>

    <form id="patient-form">
        <div class="form-row">
            <div class="form-group">
                <label for="name">Nome do paciente</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="age">Idade</label>
                <input type="number" id="age" name="age" min="0" required>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="cellphone">Celular</label>
                <input type="tel" id="cellphone" name="cellphone" required>
            </div>
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" required>
            </div>
        </div>

        <input type="hidden" id="weight" name="weight" value="0">

        <div class="form-footer">
            <button type="submit" class="submit-btn" id="register-btn">Confirmar cadastro</button>
        </div>
    </form>

    <script>
       const name = document.getElementById("name");
       const email = document.getElementById("email");
       const weight = document.getElementById("weight");
       const age = document.getElementById("age");
       const cellphone = document.getElementById("cellphone");
       const form = document.getElementById("patient-form");


       form.addEventListener("submit", async function(e){
        e.preventDefault()

        const res = await fetch("http://localhost:8080/addPatient", {
         method: "POST",
         headers: {
             "Content-Type": "application/json"
         },
         body: JSON.stringify({
             name: name.value,
             email: email.value,
             weight: weight.value,
             age: age.value,
             cellphone: cellphone.value,
         })
        });

        if (res.ok) {
            alert("registration worked");
            form.reset();
        } else {
            alert("Registration failed");
        }

       })

    </script>
</body>
</html>
