<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melon Diet</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        header {
            height: 72px;
            display: flex;
            align-items: center;
            padding: 0 240px;
            background: #fff;
            border-bottom: 1px solid #eee;
        }

        .title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .add-patient-btn {
            width: 40px;
            height: 40px;
            border-radius: 16px;
            background: #111;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .add-patient-btn:hover {
            opacity: 0.85;
        }

        header .logo {
            font-family: 'Poppins', sans-serif;
            font-size: 1.25rem;
            font-weight: 600;
            color: #111;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: #fff;
            padding: 0;
        }

        .content {
            padding: 2rem 240px;
        }

        .page-title {
            font-family: 'Poppins', sans-serif;
            font-size: 32px;
            font-weight: 700;
            color: #111;
        }

        .patient-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 2rem;
        }

        .patient-table th,
        .patient-table td {
            text-align: left;
            padding: 0.85rem 1rem;
        }

        .patient-table th {
            font-size: 0.8rem;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            border-bottom: 1px solid #eee;
        }

        .patient-table td {
            font-size: 0.95rem;
            color: #111;
            border-bottom: 1px solid #f5f5f5;
        }

        .patient-table tr:hover td {
            background: #fafafa;
        }
    </style>
</head>
<body>
    <header>
        <span class="logo">NUTRI</span>
    </header>
    <div class="content">
        <div class="title-row">
            <h1 class="page-title">Meus pacientes</h1>
            <a href="createPatient.html" class="add-patient-btn">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
                    <path d="M5.25 6.375a4.125 4.125 0 1 1 8.25 0 4.125 4.125 0 0 1-8.25 0ZM2.25 19.125a7.125 7.125 0 0 1 14.25 0v.003l-.001.119a.75.75 0 0 1-.363.63 13.067 13.067 0 0 1-6.761 1.873c-2.472 0-4.786-.684-6.76-1.873a.75.75 0 0 1-.364-.63l-.001-.122ZM18.75 7.5a.75.75 0 0 0-1.5 0v2.25H15a.75.75 0 0 0 0 1.5h2.25v2.25a.75.75 0 0 0 1.5 0v-2.25H21a.75.75 0 0 0 0-1.5h-2.25V7.5Z" />
                </svg>
            </a>
        </div>

        <table class="patient-table">
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Idade</th>
                    <th>Celular</th>
                    <th>E-mail</th>
                </tr>
            </thead>
            <tbody id="patient-tbody">
            </tbody>
        </table>
    </div>

    <script>
       async function fetchPatients() {
        const res = await fetch("http://localhost:8080/allPatients")
        const patients = await res.json();

        const tbody = document.getElementById("patient-tbody")
        //clears any existing rows. 
        tbody.innerHTML = ""

        patients.forEach(function(p) {
            const row = document.createElement("tr")
            row.innerHTML = 
            "<td>" + p.name + "</td>" +
                "<td>" + p.age + "</td>" +
                "<td>" + p.cellphone + "</td>" +
                "<td>" + p.email + "</td>"
            tbody.appendChild(row)
        })
       }

       fetchPatients()
    </script>
</body>
</html>
